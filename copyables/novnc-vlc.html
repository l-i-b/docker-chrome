<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VLC Kiosk</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #111;
      color: #f5f5f5;
      font-family: sans-serif;
    }

    .bar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #1d1d1d;
      border-bottom: 1px solid #333;
    }

    .bar .left {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .bar button {
      border: 0;
      border-radius: 6px;
      padding: 8px 10px;
      background: #2f7ef7;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }

    .bar button:hover {
      background: #2167cf;
    }

    .hint {
      font-size: 13px;
      color: #bbb;
    }

    iframe {
      width: 100%;
      height: calc(100% - 56px);
      border: 0;
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
  <div class="bar">
    <div class="left">
      <button id="audioBtn" type="button">Start Audio</button>
      <span class="hint">If muted, click Start Audio once. Audio comes from port 8090 root stream.</span>
    </div>
    <audio id="audio" controls preload="none"></audio>
  </div>

  <iframe id="vnc" title="VNC Session"></iframe>

  <script>
    const host = window.location.hostname;
    const noVncPort = window.location.port || "6080";
    const audioPort = "8090";

    const vnc = document.getElementById("vnc");
    const audio = document.getElementById("audio");
    const audioBtn = document.getElementById("audioBtn");

    vnc.src = `/vnc.html?autoconnect=true&resize=scale&view_only=false&host=${encodeURIComponent(host)}&port=${encodeURIComponent(noVncPort)}`;
    audio.src = `http://${host}:${audioPort}/`;

    audioBtn.addEventListener("click", () => {
      audio.play().catch(() => {
        alert("Audio autoplay is blocked by the browser. Click play in the audio controls.");
      });
    });
  </script>
</body>
</html>
